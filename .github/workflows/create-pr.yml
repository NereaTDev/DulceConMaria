name: auto-create-pull-request

on:
  push:
    branches:
      - "feat/**"
      - "bf/**"
      - "hf/**"

jobs:
  create-pull-request:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync feature branch"
          title: "Auto PR: ${GITHUB_REF#refs/heads/}"
          body: |
            Pull request creado automáticamente a partir de la rama `${GITHUB_REF#refs/heads/}`.

            - No merges directos a `main`.
            - Asegúrate de que los tests pasan antes de aprobar.
          base: main
          branch: "${GITHUB_REF#refs/heads/}"
          draft: false
          labels: |
            auto-pr
